  <style>
    html, body {
      margin: 0;
      text-size-adjust: none;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      overflow-x: scroll;
    }
    main {
      box-sizing: border-box;
      padding: 1.5em;
    }

    ::selection{
      background-color:rgba(79, 143, 254, 0.5);
    }

    .item {
      display: inline-block;
      padding: 0em 0.25em;
      margin: 1em 0;
      border: 1px dotted rgba(79, 143, 254, 0.5);
    }
    .item img, .item video {
      width: auto; height: auto;
      max-width: 28em; max-height: 26em;
    }
    .item audio {
      max-width: 18em;
      height: 3em;
    }
    h1, h2, h3, h4, h5, h6 {
      font-size: 1em;
      font-weight: normal;
      color: gray;
    }
    h1, h2, h3, h4, h5, h6, p, ul, ol, li, pre, code {
      margin: 0;
    }
    pre {
      font-family: inherit;
      white-space: pre-wrap;
    }

    a{
      color:rgb(84, 136, 226);
    }
    a:hover{
      color:rgb(127, 174, 255);
    }

    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6, .md p, .md pre {
      margin-top: 1em;
    }

    #back{
      position:fixed;
      top:1em;
      left:1.5em;
      padding:0em 0.25em;
      margin:1em 0;
      background-color:white;
      z-index:999;
    }

    .breadcrumb-line{
      white-space:nowrap;
    }
  </style>
</head>

      </div>
